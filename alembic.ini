[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is intentionally omitted here — migrations/env.py reads
# DATABASE_URL from app.config.get_settings() instead, so there's one source
# of truth for the connection string (shared with the app/worker).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
