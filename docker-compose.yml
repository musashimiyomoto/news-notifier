services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: news_notifier
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # api runs `alembic upgrade head` + seeds on startup (see docker-entrypoint.sh),
  # so there's no separate migrate service anymore.
  api:
    build: .
    command: ["api"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/news_notifier
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/news_notifier
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # api applies migrations before it reports healthy-ish; start worker after it
      # so the schema exists by the time jobs run.
      api:
        condition: service_started

  # arq job monitoring UI — reads worker/scheduler queue state straight out of
  # Redis, no changes to the worker itself. https://github.com/antonko/arq-ui
  arq-ui:
    image: antonk0/arq-ui
    ports:
      - "8001:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
