# Test suite only touches pure logic (search merge, dedup, scoring, scheduling,
# prompts/client via httpx.MockTransport) — no Postgres/Redis/LLM services and
# no Playwright browser download are needed, so this stays a single fast job.
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      # Catches syntax errors in modules the tests don't import (worker
      # settings pull in the whole task graph, but e.g. sources_seed and
      # alembic env are only exercised at deploy time).
      - name: Byte-compile everything
        run: python -m compileall -q app migrations tests
