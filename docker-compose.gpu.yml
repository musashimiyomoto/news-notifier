services:
  # CUDA-specific override for the base CPU `llm` service. Keep this file
  # small so database, worker, healthcheck, ports, and model cache stay shared.
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    gpus: all
    command:
      - -hf
      - "${LLM_HF_MODEL:-bartowski/Qwen_Qwen3-4B-Instruct-2507-GGUF:Q4_K_M}"
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --parallel
      - "${LLM_PARALLEL:-1}"
      - --threads
      - "${LLM_THREADS:-2}"
      - --ctx-size
      - "${LLM_CONTEXT_SIZE:-4096}"
      - --n-gpu-layers
      - "${LLM_GPU_LAYERS:-99}"
      - --jinja
